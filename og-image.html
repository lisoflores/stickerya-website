<!DOCTYPE html>
<!-- Fuente de la og-image (1200×630). Render: Chrome headless --window-size=1200,630 --screenshot=og-image.png -->
<html lang="es">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@500;600;700&family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,600,1,0&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    width: 1200px; height: 630px; overflow: hidden; position: relative;
    background: linear-gradient(135deg, #3B82F6, #2563EB);
    font-family: Inter, sans-serif; -webkit-font-smoothing: antialiased;
  }
  .glow-a { position: absolute; width: 520px; height: 520px; border-radius: 50%; background: rgba(255,255,255,.08); top: -180px; right: -120px; }
  .glow-b { position: absolute; width: 420px; height: 420px; border-radius: 50%; background: rgba(6,182,212,.22); bottom: -160px; left: -120px; }
  .wrap { position: relative; height: 100%; display: flex; align-items: center; padding: 0 76px; gap: 40px; }
  .left { flex: 1 1 auto; }
  .wordmark { font-family: 'Baloo 2', sans-serif; font-weight: 800; font-size: 104px; line-height: 1; letter-spacing: -2px; color: #fff; }
  .wordmark .bang { color: #FACC15; }
  .tagline { font-family: 'Baloo 2', sans-serif; font-weight: 700; font-size: 46px; line-height: 1.12; color: #fff; margin-top: 22px; letter-spacing: -.5px; max-width: 620px; }
  .badges { display: flex; flex-wrap: wrap; gap: 12px; margin-top: 30px; }
  .badge { display: flex; align-items: center; gap: 8px; height: 46px; padding: 0 20px; border-radius: 23px; background: rgba(255,255,255,.16); color: #fff; font-size: 21px; font-weight: 600; }
  .badge .ms { font-family: 'Material Symbols Rounded'; font-size: 24px; color: #FACC15; }
  .right { flex: 0 0 auto; position: relative; width: 360px; height: 400px; }
  .icon { position: absolute; top: 60px; left: 30px; width: 260px; height: 260px; border-radius: 60px; transform: rotate(-6deg); box-shadow: 0 32px 70px rgba(15,23,42,.45); }
  .tile { position: absolute; border: 6px solid #fff; border-radius: 26px; display: grid; place-items: center; box-shadow: 0 18px 34px rgba(15,23,42,.30); }
  .t1 { width: 118px; height: 118px; background: #FFE4E6; font-size: 62px; top: -6px; right: 6px; transform: rotate(8deg); }
  .t2 { width: 104px; height: 104px; background: #FEF3C7; font-size: 54px; top: 118px; right: -18px; transform: rotate(-7deg); }
  .t3 { width: 110px; height: 110px; background: #CCFBF1; font-size: 58px; bottom: 4px; right: 40px; transform: rotate(6deg); }
  .spark { position: absolute; font-size: 40px; }
  .s1 { top: 20px; left: 6px; }
  .s2 { bottom: 60px; left: -6px; font-size: 30px; }
</style>
</head>
<body>
  <div class="glow-a"></div>
  <div class="glow-b"></div>
  <div class="wrap">
    <div class="left">
      <div class="wordmark">StickerYa<span class="bang">!</span></div>
      <div class="tagline">Tus fotos, tus stickers.<br>Sin que salgan de tu teléfono.</div>
      <div class="badges">
        <span class="badge"><span class="ms">check_circle</span>Gratis</span>
        <span class="badge"><span class="ms">check_circle</span>Sin anuncios molestos</span>
        <span class="badge"><span class="ms">lock</span>100% privado</span>
      </div>
    </div>
    <div class="right">
      <span class="spark s1">✨</span>
      <span class="spark s2">✨</span>
      <img class="icon" src="icon.png" alt="StickerYa!">
      <div class="tile t1">🐶</div>
      <div class="tile t2">🌮</div>
      <div class="tile t3">🤩</div>
    </div>
  </div>
</body>
</html>
